## This workflow installs Python dependencies, type-checks, builds, and runs the
## test suite across a matrix of JAX versions.
## For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ main ]
  schedule:
    # Runs at 00:00 UTC every day. See https://crontab.guru for cron syntax.
    - cron: '0 0 * * *'
  workflow_dispatch:


permissions:
  contents: read  # to fetch code
  actions: write  # to cancel previous workflows

# This is what will cancel the workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  test:
    name: Test (py${{ matrix.python-version }}, jax ${{ matrix.jax-version || 'latest' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.14" ]
        jax-version: [ "0.8.0", "0.9.0", "" ]  # "" means latest version

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip cache purge
          python -m pip install --upgrade pip setuptools
          python -m pip install -r requirements-dev.txt
          if [ "${{ matrix.jax-version }}" == "" ]; then
            python -m pip install jax || exit 1
          else
            python -m pip install jax==${{ matrix.jax-version }} || exit 1
          fi
          python -m pip install . || exit 1
      - name: Test with pytest
        run: |
          pytest braintrace/ --cov=braintrace --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        # Upload from a single matrix entry (latest JAX) to avoid duplicate
        # reports. Never fail CI on an upload hiccup / missing token.
        if: matrix.jax-version == ''
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: braintrace-coverage
          fail_ci_if_error: false


  typecheck_and_build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.13" ]

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip cache purge
          python -m pip install --upgrade pip setuptools --no-cache-dir
          python -m pip install -r requirements-dev.txt --no-cache-dir
          pip install .
      - name: Type check with mypy
        run: |
          python -m mypy braintrace
      - name: Build wheel and sdist
        run: |
          python -m build
      - name: Verify py.typed is shipped in wheel and sdist (PEP 561)
        run: |
          python - <<'EOF'
          import glob, sys, zipfile, tarfile

          wheel = glob.glob('dist/*.whl')[0]
          sdist = glob.glob('dist/*.tar.gz')[0]
          wheel_ok = any(n.endswith('braintrace/py.typed') for n in zipfile.ZipFile(wheel).namelist())
          sdist_ok = any(n.endswith('braintrace/py.typed') for n in tarfile.open(sdist).getnames())
          print(f'wheel={wheel} py.typed={wheel_ok}')
          print(f'sdist={sdist} py.typed={sdist_ok}')
          if not (wheel_ok and sdist_ok):
              sys.exit('ERROR: braintrace/py.typed missing from build artifacts')
          EOF
